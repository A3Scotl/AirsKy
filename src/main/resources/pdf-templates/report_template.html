<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Báo Cáo AirSky</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        @page {
            size: A4 landscape;
            margin: 2cm 1.5cm 2.5cm 1.5cm;

            @top-center {
                content: element(header);
            }

            @bottom-center {
                content: element(footer);
            }
        }

        #header {
            position: running(header);
            background: linear-gradient(to right, #007BFF, #0056D2);
            color: white;
            padding: 10px;
            text-align: center;
            border-bottom: 2px solid #004085;
        }

        #header h1 {
            margin: 0;
            font-size: 18pt;
            font-weight: 700;
        }

        #header .meta {
            font-size: 10pt;
            margin-top: 5px;
        }

        #footer {
            position: running(footer);
            background: #f8f9fa;
            color: #6c757d;
            padding: 5px;
            text-align: center;
            border-top: 1px solid #dee2e6;
            font-size: 9pt;
        }

        #footer .page-info {
            margin: 0;
        }

        .content {
            margin-top: 50px;
            margin-bottom: 50px;
        }

        .description {
            font-size: 11pt;
            margin-bottom: 20px;
            color: #6c757d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #dee2e6;
            padding: 8px 10px;
            text-align: left;
            font-size: 10pt;
            word-break: break-word;
        }

        th {
            background-color: #e9ecef;
            font-weight: 700;
            color: #495057;
            vertical-align: middle;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        .col-thumbnail {
            width: 12%;
            max-width: 12%;
        }

        .col-wide {
            width: 25%;
            min-width: 15%;
        }

        .col-medium {
            width: 18%;
            min-width: 12%;
        }

        .col-narrow {
            width: 10%;
            min-width: 10%;
        }

        .col-auto {
            width: auto;
            min-width: 10%;
        }
    </style>
</head>

<body>
    <div id="header">
        <h1>{{COMPANY_NAME}} - {{TITLE}}</h1>
        <div class="meta">Ngày xuất: {{EXPORT_DATE}} | Tổng bản ghi: {{RECORD_COUNT}}</div>
    </div>

    <div class="content">
        <div class="description">{{DESCRIPTION}}</div>
        <table>
            <thead>
                <tr>
                    {{TABLE_HEADER}}
                </tr>
            </thead>
            <tbody>
                {{TABLE_BODY}}
            </tbody>
        </table>
    </div>

    <div id="footer">
        <p class="page-info">Trang <span class="pageNumber"></span> / <span class="totalPages"></span> |
            {{CONTACT_INFO}} | {{COPYRIGHT}}</p>
    </div>
</body>

</html>
