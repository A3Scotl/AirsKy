spring:
  application:
    name: AirsKy
  datasource:
    url: jdbc:mysql://mysql-a5364d8-nkha3561.j.aivencloud.com:17244/defaultdb?ssl-mode=REQUIRED
    username: avnadmin
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mvc:
    dispatch-options-request: true
  web:
    resources:
      add-mappings: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB
  #  redis:
  #    host: localhost
  #    port: 6379
  #    password:
  #  datasource:
  #    url: ${DB_URL}
  #    username: ${DB_USERNAME}
  #    password: ${DB_PASSWORD}
  #    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        ssl: true
  #        globally_quoted_identifiers: true
  sql:
    init:
      mode: always
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
jwt:
  secret: ${JWT_SECRET}
  access:
    expiration: 3600000
  refresh:
    expiration: 604800000

#verification:
#  code:
#    expiration: 300000

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}
#recaptcha:
#  secret: ${RECAPTCHA_SECRET_KEY}

# application.yml
google:
  client-id: ${GOOGLE_CLIENT_ID}

logging:
  level:
    iuh.fit.airsky.service.impl: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
