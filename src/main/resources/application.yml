spring:
  application:
    name: AirsKy
  datasource:
    url: jdbc:mariadb://localhost:3306/fly
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jackson:
    serialization:
      write-dates-as-timestamps: false
#  datasource:
#    url: ${DB_URL}
#    username: ${DB_USERNAME}
#    password: ${DB_PASSWORD}
#    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        ssl: true
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
jwt:
  secret: ${JWT_SECRET}
  access:
    expiration: 3600000
  refresh:
    expiration: 604800000

#verification:
#  code:
#    expiration: 300000

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}
#recaptcha:
#  secret: ${RECAPTCHA_SECRET_KEY}

