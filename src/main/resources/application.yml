  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    # open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        ssl: true
  #        globally_quoted_identifiers: true
  freemarker:
    template-loader-path: classpath:/email
    charset: UTF-8
    enabled: true
  sql:
    init:
      mode: always
